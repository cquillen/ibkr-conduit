# Grouping strategy: minor + patch bumps consolidate into one PR per ecosystem.
# Major bumps bypass grouping so each receives individual review.
version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      testing:
        patterns:
          - "xunit*"
          - "Shouldly"
          - "coverlet*"
          - "WireMock*"
          - "NSubstitute"
        update-types:
          - "minor"
          - "patch"
      production:
        patterns:
          - "*"
        exclude-patterns:
          - "xunit*"
          - "Shouldly"
          - "coverlet*"
          - "WireMock*"
          - "NSubstitute"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "ci"
